# ─────────────────────────────────────────────────────────────
# Receta compartida: “empaquetar la app y dejarla en Docker Hub”
# Otros repositorios pueden llamarla sin copiar todo el script.
# ─────────────────────────────────────────────────────────────

name: Subir la API a Docker Hub (receta reutilizable)

on:
  workflow_call:
    inputs:
      image-name:
        description: Cómo se llamará la imagen en Docker Hub (solo el nombre, sin tu usuario)
        required: true
        type: string
      image-tag:
        description: Etiqueta que identifica esta versión (por ejemplo el identificador del commit)
        required: true
        type: string
      k3s-server-public-ip:
        description: >
          IP pública del servidor K3S. En el repo cliente suele guardarse como variable
          de repositorio (p. ej. K3S_SERVER_PUBLIC_IP) y pasarse en el bloque with del uses.
        required: true
        type: string
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true
      EA2_SSH_PRIVATE_KEY:
        required: true
  workflow_dispatch:
    inputs:
      image-name:
        description: Nombre corto de la imagen (ej. mi-api-academica)
        required: true
        type: string
      image-tag:
        description: Etiqueta de esta versión (ej. v1.0.0)
        required: true
        type: string
      k3s-server-public-ip:
        description: IP pública del servidor K3S (si corres este workflow aquí, pulsa el valor; vía workflow_call suele inyectarse desde vars del repo app).
        required: true
        type: string

jobs:
  deps-and-test:
    name: Dependencies and tests
    runs-on: ubuntu-latest
    steps:
      - name: 1 · Descargar el código del repositorio
        uses: actions/checkout@v4

      - name: 2 · Instalar dependencias
        run: npm install

      - name: 3 · Ejecutar tests
        run: npm test

  build-and-push:
    name: Build and push Docker image
    needs: deps-and-test
    runs-on: ubuntu-latest
    steps:
      - name: 1 · Descargar el código del repositorio
        uses: actions/checkout@v4

      - name: 2 · Iniciar sesión en Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 3 · Armar la imagen y publicarla
        run: |
          IMAGEN_COMPLETA="${{ secrets.DOCKER_USERNAME }}/${{ inputs.image-name }}"

          docker build \
            -t "${IMAGEN_COMPLETA}:${{ inputs.image-tag }}" \
            -t "${IMAGEN_COMPLETA}:latest" \
            .

          docker push --all-tags "${IMAGEN_COMPLETA}"

  deploy-to-k8s:
    name: Deploy to AWS K3S
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EA2_SSH_PRIVATE_KEY }}

      - name: 1 · SSH al servidor K3S
        run: ssh -o StrictHostKeyChecking=accept-new "ubuntu@${{ inputs.k3s-server-public-ip }}" 'echo ok'

      - name: Checkout (manifiestos K8s)
        uses: actions/checkout@v4

      - name: Copiar k8s/ al servidor y aplicar
        run: |
          set -euo pipefail
          test -d k8s || { echo "::error::Falta carpeta k8s/ en la raíz del repo"; exit 1; }
          ssh -o StrictHostKeyChecking=accept-new "ubuntu@${{ inputs.k3s-server-public-ip }}" 'sudo rm -rf /tmp/k8s-deploy'
          scp -o StrictHostKeyChecking=accept-new -r k8s "ubuntu@${{ inputs.k3s-server-public-ip }}:/tmp/k8s-deploy"

          ssh -o StrictHostKeyChecking=accept-new "ubuntu@${{ inputs.k3s-server-public-ip }}" \
            'sudo k3s kubectl apply -f /tmp/k8s-deploy/'

      - name: 2 · Despliegue Blue-Green Nativo + Validación de Salud Activa
        run: |
          set -euo pipefail
          SERVER="ubuntu@${{ inputs.k3s-server-public-ip }}"

          # 1. Identificar el color que actualmente atiende a los usuarios mediante el servicio demo-api
          COLOR_ACTUAL=$(ssh -o StrictHostKeyChecking=accept-new "$SERVER" \
            "sudo k3s kubectl get svc demo-api -o jsonpath='{.spec.selector.color}'" || echo "blue")

          if [ "$COLOR_ACTUAL" = "blue" ]; then COLOR_NUEVO="green"; else COLOR_NUEVO="blue"; fi

          echo "COLOR_ACTUAL=$COLOR_ACTUAL" >> $GITHUB_ENV
          echo "COLOR_NUEVO=$COLOR_NUEVO" >> $GITHUB_ENV
          echo "Ambiente activo actual: $COLOR_ACTUAL | Ambiente objetivo (silencioso): $COLOR_NUEVO"

          # 2. Inyectar en caliente la nueva versión construida en el ambiente silencioso (contenedor: api)
          IMAGE_COMPLETA="${{ secrets.DOCKER_USERNAME }}/${{ inputs.image-name }}:${{ inputs.image-tag }}"

          echo "Actualizando imagen en el ambiente: $COLOR_NUEVO"
          ssh -o StrictHostKeyChecking=accept-new "$SERVER" \
            "sudo k3s kubectl set image deployment/demo-api-$COLOR_NUEVO api=$IMAGE_COMPLETA"

          # 3. Esperar a que Kubernetes confirme que el pod nuevo está Ready (readiness/liveness)
          echo "Esperando a que el rollout de demo-api-$COLOR_NUEVO complete (pods Ready)..."
          ssh -o StrictHostKeyChecking=accept-new "$SERVER" \
            "sudo k3s kubectl rollout status deployment/demo-api-$COLOR_NUEVO --timeout=90s"

          # 4. Validación de Salud ACTIVA: golpeamos /health directo en el pod nuevo (no vía Service,
          #    porque el Service aún no apunta a este color) y evaluamos código HTTP + latencia real.
          echo "Ejecutando Validación de Salud activa contra /health en el pod $COLOR_NUEVO..."

          POD_IP=$(ssh -o StrictHostKeyChecking=accept-new "$SERVER" \
            "sudo k3s kubectl get pods -l app=demo-api,color=$COLOR_NUEVO -o jsonpath='{.items[0].status.podIP}'")

          if [ -z "$POD_IP" ]; then
            echo "::error::No se pudo obtener la IP del pod $COLOR_NUEVO"
            exit 1
          fi

          MAX_LATENCIA_MS=2000
          INTENTOS=5
          EXITO="false"
          HTTP_CODE="000"
          TIEMPO_MS="0"

          for i in $(seq 1 $INTENTOS); do
            echo "  Intento $i/$INTENTOS..."
            RESPUESTA=$(ssh -o StrictHostKeyChecking=accept-new "$SERVER" \
              "curl -s -o /dev/null -w '%{http_code} %{time_total}' --max-time 5 http://$POD_IP:3000/health" || echo "000 0")

            HTTP_CODE=$(echo "$RESPUESTA" | awk '{print $1}')
            TIEMPO_S=$(echo "$RESPUESTA" | awk '{print $2}')
            TIEMPO_MS=$(awk "BEGIN {printf \"%.0f\", $TIEMPO_S * 1000}")

            echo "    → HTTP $HTTP_CODE en ${TIEMPO_MS}ms (máx permitido: ${MAX_LATENCIA_MS}ms)"

            if [ "$HTTP_CODE" = "200" ] && [ "$TIEMPO_MS" -lt "$MAX_LATENCIA_MS" ]; then
              EXITO="true"
              break
            fi

            sleep 3
          done

          if [ "$EXITO" != "true" ]; then
            echo "::error::Validación de salud FALLÓ para $COLOR_NUEVO → HTTP=$HTTP_CODE, Latencia=${TIEMPO_MS}ms"
            exit 1
          fi

          # 5. Cambio de Tráfico si la salud es exitosa
          echo "Todo sano. Conmutando tráfico hacia $COLOR_NUEVO"
          ssh -o StrictHostKeyChecking=accept-new "$SERVER" \
            "sudo k3s kubectl patch svc demo-api -p '{\"spec\":{\"selector\":{\"color\":\"'$COLOR_NUEVO'\"}}}'"

          echo "Despliegue Blue-Green completado con éxito. Tráfico 100% en $COLOR_NUEVO."

      # ─────────────────────────────────────────────────────────────────────────────
      # REMEDIACIÓN AUTOMÁTICA EN CASO DE FALLO (Ítem 3)
      # ─────────────────────────────────────────────────────────────────────────────
      - name: 3 · Rollback Automático de Emergencia
        if: failure()
        run: |
          SERVER="ubuntu@${{ inputs.k3s-server-public-ip }}"

          echo "[FALLO DETECTADO] La versión nueva en ${COLOR_NUEVO:-desconocido} no superó las pruebas de salud."
          echo "Manteniendo a los usuarios a salvo en el ambiente antiguo (${COLOR_ACTUAL:-blue})."

          ssh -o StrictHostKeyChecking=accept-new "$SERVER" \
            "sudo k3s kubectl patch svc demo-api -p '{\"spec\":{\"selector\":{\"color\":\"'${COLOR_ACTUAL:-blue}'\"}}}'"

          if [ -n "${COLOR_NUEVO:-}" ]; then
            ssh -o StrictHostKeyChecking=accept-new "$SERVER" \
              "sudo k3s kubectl rollout undo deployment/demo-api-$COLOR_NUEVO"
          fi

          echo "Rollback completado. El servicio demo-api sigue sirviendo desde ${COLOR_ACTUAL:-blue}."