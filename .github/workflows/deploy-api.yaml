# ─────────────────────────────────────────────────────────────
# Receta compartida: “empaquetar la app y dejarla en Docker Hub”
# Otros repositorios pueden llamarla sin copiar todo el script.
# ─────────────────────────────────────────────────────────────

name: Subir la API a Docker Hub (receta reutilizable)

on:
  # Los repos cliente pasan la IP K3S como input (no hay acceso a vars del caller desde aquí).
  # Ejemplo en el cliente: with: k3s-server-public-ip: ${{ vars.K3S_SERVER_PUBLIC_IP }}
  #
  # Cuando otro repo te “llama” y te pasa nombre de imagen, tag y secretos
  workflow_call:
    inputs:
      image-name:
        description: Cómo se llamará la imagen en Docker Hub (solo el nombre, sin tu usuario)
        required: true
        type: string
      image-tag:
        description: Etiqueta que identifica esta versión (por ejemplo el identificador del commit)
        required: true
        type: string
      k3s-server-public-ip:
        description: >
          IP pública del servidor K3S. En el repo cliente suele guardarse como variable
          de repositorio (p. ej. K3S_SERVER_PUBLIC_IP) y pasarse en el bloque with del uses.
        required: true
        type: string
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true
      EA2_SSH_PRIVATE_KEY:
        required: true
  # Ejecución manual desde GitHub → Actions → Run workflow (mismos inputs que vía workflow_call)
  workflow_dispatch:
    inputs:
      image-name:
        description: Nombre corto de la imagen (ej. mi-api-academica)
        required: true
        type: string
      image-tag:
        description: Etiqueta de esta versión (ej. v1.0.0)
        required: true
        type: string
      k3s-server-public-ip:
        description: IP pública del servidor K3S (si corres este workflow aquí, pulsa el valor; vía workflow_call suele inyectarse desde vars del repo app).
        required: true
        type: string

jobs:
  # Etapa 1 · Instalar dependencias y ejecutar tests (si falla, no se construye ni publica la imagen)
  deps-and-test:
    name: Dependencies and tests
    runs-on: ubuntu-latest
    steps:
      - name: 1 · Descargar el código del repositorio
        uses: actions/checkout@v4

      - name: 2 · Instalar dependencias
        run: npm install

      - name: 3 · Ejecutar tests
        run: npm test

  # Etapa 2 · Solo corre si la etapa anterior terminó bien
  build-and-push:
    name: Build and push Docker image
    needs: deps-and-test
    runs-on: ubuntu-latest
    steps:
      # Paso 1 · Traer el código que está en GitHub a la máquina temporal del workflow
      - name: 1 · Descargar el código del repositorio
        uses: actions/checkout@v4
        
      # Paso 2 · Decirle a Docker “soy io” usando usuario y contraseña/token guardados en secretos
      - name: 2 · Iniciar sesión en Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Paso 3 · Construir la “foto” de la app y subir todas las etiquetas que creamos abajo
      - name: 3 · Armar la imagen y publicarla
        run: |
          # Nombre completo en Docker Hub: tu-usuario/nombre-de-la-imagen
          IMAGEN_COMPLETA="${{ secrets.DOCKER_USERNAME }}/${{ inputs.image-name }}"

          # Una sola construcción, dos etiquetas: la de esta versión y "latest" (la última)
          docker build \
            -t "${IMAGEN_COMPLETA}:${{ inputs.image-tag }}" \
            -t "${IMAGEN_COMPLETA}:latest" \
            .

          # Sube al Hub todas las etiquetas que acabamos de crear para esta imagen
          docker push --all-tags "${IMAGEN_COMPLETA}"

  deploy-to-k8s:
    name: Deploy to AWS K3S
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EA2_SSH_PRIVATE_KEY }}

      - name: 1 · SSH al servidor K3S
        run: ssh -o StrictHostKeyChecking=accept-new "ubuntu@${{ inputs.k3s-server-public-ip }}" 'echo ok'

      # Manifiestos viven en el repo que invoca este workflow (ej. k8s/demo.yaml)
      - name: Checkout (manifiestos K8s)
        uses: actions/checkout@v4

      - name: Copiar k8s/ al servidor y aplicar
        run: |
          set -euo pipefail
          test -d k8s || { echo "::error::Falta carpeta k8s/ en la raíz del repo"; exit 1; }
          ssh -o StrictHostKeyChecking=accept-new "ubuntu@${{ inputs.k3s-server-public-ip }}" 'sudo rm -rf /tmp/k8s-deploy'
          scp -o StrictHostKeyChecking=accept-new -r k8s "ubuntu@${{ inputs.k3s-server-public-ip }}:/tmp/k8s-deploy"
          
          #Apuntar directamente a /tmp/k8s-deploy/ donde están los archivos
          ssh -o StrictHostKeyChecking=accept-new "ubuntu@${{ inputs.k3s-server-public-ip }}" \
            'sudo k3s kubectl apply -f /tmp/k8s-deploy/'

      - name: 2 · Despliegue Blue-Green Nativo
        run: |
          # 1. Identificar el color que actualmente atiende a los usuarios mediante el servicio demo-api
          COLOR_ACTUAL=$(ssh -o StrictHostKeyChecking=accept-new "ubuntu@${{ inputs.k3s-server-public-ip }}" \
            "sudo k3s kubectl get svc demo-api -o jsonpath='{.spec.selector.color}'" || echo "blue")
          
          if [ "$COLOR_ACTUAL" = "blue" ]; then COLOR_NUEVO="green"; else COLOR_NUEVO="blue"; fi
          
          echo "COLOR_ACTUAL=$COLOR_ACTUAL" >> $GITHUB_ENV
          echo "COLOR_NUEVO=$COLOR_NUEVO" >> $GITHUB_ENV

          # 2. Inyectar en caliente la nueva versión construida en el ambiente silencioso (contenedor: api)
          IMAGE_COMPLETA="${{ secrets.DOCKER_USERNAME }}/${{ inputs.image-name }}:${{ inputs.image-tag }}"
          
          echo "Actualizando imagen en el ambiente: $COLOR_NUEVO"
          ssh -o StrictHostKeyChecking=accept-new "ubuntu@${{ inputs.k3s-server-public-ip }}" \
            "sudo k3s kubectl set image deployment/demo-api-$COLOR_NUEVO api=$IMAGE_COMPLETA"

          # 3. Validación de Salud (Health Check)
          echo "Esperando validación de salud para demo-api-$COLOR_NUEVO..."
          ssh -o StrictHostKeyChecking=accept-new "ubuntu@${{ inputs.k3s-server-public-ip }}" \
            "sudo k3s kubectl rollout status deployment/demo-api-$COLOR_NUEVO --timeout=45s"

          # 4. Cambio de Tráfico si la salud es exitosa
          echo "Todo sano. Conmutando tráfico hacia $COLOR_NUEVO"
          ssh -o StrictHostKeyChecking=accept-new "ubuntu@${{ inputs.k3s-server-public-ip }}" \
            "sudo k3s kubectl patch svc demo-api -p '{\"spec\":{\"selector\":{\"color\":\"'$COLOR_NUEVO'\"}}}'"

      # ─────────────────────────────────────────────────────────────────────────────
      # REMEDIACIÓN AUTOMÁTICA EN CASO DE FALLO (Ítem 3)
      # ─────────────────────────────────────────────────────────────────────────────
      - name: 3 · Rollback Automático de Emergencia
        if: failure()
        run: |
          echo "[FALLO DETECTADO] La versión nueva en $COLOR_NUEVO no superó las pruebas de salud."
          echo "Manteniendo a los usuarios a salvo en el ambiente antiguo ($COLOR_ACTUAL)."
          
          # Aseguramos que el Service no se mueva del color sano
          ssh -o StrictHostKeyChecking=accept-new "ubuntu@${{ inputs.k3s-server-public-ip }}" \
            "sudo k3s kubectl patch svc demo-api -p '{\"spec\":{\"selector\":{\"color\":\"'$COLOR_ACTUAL'\"}}}'"
          
          # Deshacemos el despliegue fallido
          ssh -o StrictHostKeyChecking=accept-new "ubuntu@${{ inputs.k3s-server-public-ip }}" \
            "sudo k3s kubectl rollout undo deployment/demo-api-$COLOR_NUEVO"